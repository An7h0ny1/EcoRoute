spring.application.name=EcoRoute

# Configuración de la Base de Datos (Usa variables de entorno para CubePath)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecoroute}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Puerto de la aplicación (CubePath suele usar el 8080)
server.port=${PORT:8080}

# Permitir que Spring ejecute el archivo import.sql al iniciar
spring.sql.init.mode=always

# Activar Virtual Threads (Project Loom) para que cada petición sea un hilo virtual
spring.threads.virtual.enabled=true