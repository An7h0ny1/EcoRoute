<div th:fragment="error-message" class="animate-shake bg-red-500/10 border border-red-500/30 p-5 rounded-3xl text-red-400 flex items-center gap-4 shadow-2xl shadow-red-900/10">
    <div class="bg-red-500 text-white p-2 rounded-xl">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <div class="flex flex-col">
        <span class="font-bold text-lg">Error de Procesamiento</span>
        <span class="text-sm opacity-80" th:text="${error}">El dataset proporcionado no es válido.</span>
    </div>
</div>
