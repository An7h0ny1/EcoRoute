<div th:fragment="route-results" class="space-y-6 animate-fade-in">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass rounded-2xl p-6 border-l-4 border-emerald-500">
            <p class="text-slate-400 text-sm uppercase tracking-wider">Total Cost</p>
            <h3 class="text-3xl font-bold text-white" th:text="${'$' + #numbers.formatDecimal(route.cost.totalCost, 0, 'COMMA', 0, 'POINT')}"></h3>
        </div>
        <div class="glass rounded-2xl p-6 border-l-4 border-blue-500">
            <p class="text-slate-400 text-sm uppercase tracking-wider">Fuel</p>
            <h3 class="text-2xl font-semibold text-slate-200" th:text="${'$' + #numbers.formatDecimal(route.cost.fuelCost, 0, 'COMMA', 0, 'POINT')}"></h3>
        </div>
        <div class="glass rounded-2xl p-6 border-l-4 border-amber-500">
            <p class="text-slate-400 text-sm uppercase tracking-wider">Tolls</p>
            <h3 class="text-2xl font-semibold text-slate-200" th:text="${'$' + #numbers.formatDecimal(route.cost.tollCost, 0, 'COMMA', 0, 'POINT')}"></h3>
        </div>
    </div>

    <div class="glass rounded-2xl p-8 shadow-xl">
        <h2 class="text-xl font-semibold mb-6 flex items-center">
            <svg class="w-6 h-6 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Optimized Sequence
        </h2>
        <div class="space-y-4">
            <div th:each="delivery, iter : ${route.deliveries}" class="flex items-center p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                <span class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-sm font-bold text-slate-900 mr-4" th:text="${iter.count}"></span>
                <div>
                    <p class="font-medium text-white" th:text="${delivery.customerName}"></p>
                    <p class="text-sm text-slate-400" th:text="${delivery.address}"></p>
                </div>
            </div>
        </div>

        <button class="w-full mt-8 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-emerald-500/20">
            Send Route to Driver (WhatsApp)
        </button>
    </div>
</div>
